<ion-header class="ion-no-border">
  <ion-toolbar>
  </ion-toolbar>
  <ion-buttons slot="start">
    <ion-back-button defaultHref="loginscreen" text=""></ion-back-button>
  </ion-buttons>
</ion-header>

<ion-content class="ecomove-content">
  <ion-card class="ion-no-margin">
      <ion-img src="assets/images/header1.png"></ion-img>
      <ion-card-content>
        <form [formGroup]="resetForm" (ngSubmit)="resetPassword()">
          <div class="wrapform">
            <h2 style="color: white; margin-bottom: 20px; font-weight: 600; text-align: center;">Reset Password</h2>
            <p style="color: #a0a0a0; margin-bottom: 30px; text-align: center; font-size: 14px;">Enter your email and we'll send you a link to reset your password.</p>
            
            <ion-item>
              <ion-input 
                type="email" 
                formControlName="email"
                placeholder="youremail@domain.com" 
                required>
                <ion-icon name="mail-outline"></ion-icon>
              </ion-input>
            </ion-item>
          </div>
          <div class="sign-btn-wrap" style="margin-top: 30px;">
            <ion-button 
              type="submit"
              fill="clear" 
              shape="round" 
              class="sign-btn"
              [disabled]="resetForm.invalid || isLoading">
              Send Reset Link
            </ion-button>
          </div>
        </form>
      </ion-card-content>
  </ion-card>
</ion-content>
